name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($MANIFEST_VERSION)."
            echo "Bump package.json and wxt.config.ts before tagging."
            exit 1
          fi

      - name: Typecheck
        run: bun run compile

      - name: Build & zip (Chrome)
        run: bun run zip

      - name: Build & zip (Firefox)
        run: bun run zip:firefox

      - name: Sign Firefox extension (self-distribution)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          bunx web-ext sign \
            --source-dir=.output/firefox-mv3 \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --channel=unlisted \
            --artifacts-dir=.output \
            --timeout=900000

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .output/toolzzz-*-chrome.zip
            .output/toolzzz-*-firefox.zip
            .output/toolzzz-*-sources.zip
            .output/*.xpi
